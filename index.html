<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 像素工作室</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'ZCOOL KuaiLe', 'Courier New', cursive;
            padding: 20px;
            color: #fff;
        }
        h1 {
            margin-bottom: 15px;
            text-shadow: 3px 3px 0 #e94560;
            font-size: 2rem;
        }
        
        /* 房间容器 */
        .room {
            width: 900px;
            height: 600px;
            background: #f5e6d3;
            border: 6px solid #4a3728;
            position: relative;
            image-rendering: pixelated;
            box-shadow: 
                0 0 0 4px #2d1810,
                0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        
        /* 地板格子纹理 */
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 38px,
                    rgba(139,115,85,0.1) 38px,
                    rgba(139,115,85,0.1) 40px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent 0px,
                    transparent 38px,
                    rgba(139,115,85,0.1) 38px,
                    rgba(139,115,85,0.1) 40px
                ),
                #d4a574;
        }
        
        /* 墙壁 */
        .wall-left {
            position: absolute;
            left: 0;
            top: 0;
            width: 300px;
            height: 400px;
            background: #e8d5c4;
            border-right: 4px solid #c4b498;
        }
        .wall-right {
            position: absolute;
            right: 0;
            top: 0;
            width: 300px;
            height: 400px;
            background: #f0e0d0;
            border-left: 4px solid #d4c4b0;
        }
        .wall-center {
            position: absolute;
            left: 300px;
            top: 0;
            width: 300px;
            height: 400px;
            background: #e5d5c0;
        }
        
        /* 书架区域（左侧） */
        .bookshelf {
            position: absolute;
            left: 30px;
            top: 80px;
            width: 100px;
            height: 180px;
            background: #8b6914;
            border: 3px solid #5a4510;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.2);
        }
        .shelf {
            position: absolute;
            width: 94px;
            height: 6px;
            background: #5a4510;
            left: 0;
        }
        .shelf:nth-child(1) { top: 45px; }
        .shelf:nth-child(2) { top: 90px; }
        .shelf:nth-child(3) { top: 135px; }
        
        /* 书籍 */
        .book {
            position: absolute;
            width: 12px;
            border: 1px solid rgba(0,0,0,0.3);
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .book.b1 { bottom: 138px; left: 35px; height: 40px; background: #e74c3c; }
        .book.b2 { bottom: 138px; left: 50px; height: 35px; background: #3498db; }
        .book.b3 { bottom: 138px; left: 65px; height: 42px; background: #2ecc71; }
        .book.b4 { bottom: 93px; left: 40px; height: 38px; background: #f39c12; }
        .book.b5 { bottom: 93px; left: 55px; height: 36px; background: #9b59b6; }
        .book.b6 { bottom: 48px; left: 45px; height: 40px; background: #1abc9c; }
        .book.b7 { bottom: 48px; left: 60px; height: 35px; background: #e91e63; }
        
        /* 台灯 */
        .lamp {
            position: absolute;
            left: 160px;
            top: 200px;
            width: 40px;
            height: 60px;
        }
        .lamp-base {
            position: absolute;
            bottom: 0;
            width: 30px;
            height: 8px;
            background: #4a3728;
            border-radius: 2px;
        }
        .lamp-pole {
            position: absolute;
            bottom: 8px;
            left: 13px;
            width: 4px;
            height: 35px;
            background: #666;
        }
        .lamp-shade {
            position: absolute;
            top: 0;
            left: -5px;
            width: 40px;
            height: 25px;
            background: #ffeb3b;
            border: 2px solid #f9a825;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px rgba(255,235,59,0.5);
        }
        
        /* 海报 */
        .poster {
            position: absolute;
            left: 150px;
            top: 50px;
            width: 60px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 3px solid #4a3728;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        /* 中间沙发茶几区 */
        .rug {
            position: absolute;
            left: 320px;
            top: 280px;
            width: 260px;
            height: 160px;
            background: #c0392b;
            border: 4px solid #a93226;
            border-radius: 10px;
            opacity: 0.8;
        }
        
        .sofa {
            position: absolute;
            left: 340px;
            top: 320px;
            width: 220px;
            height: 80px;
            background: #2980b9;
            border: 3px solid #1a5276;
            border-radius: 10px 10px 0 0;
        }
        .sofa::before {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 20px;
            width: 180px;
            height: 30px;
            background: #2471a3;
            border: 3px solid #1a5276;
            border-top: none;
        }
        .sofa-cushion {
            position: absolute;
            top: -15px;
            width: 60px;
            height: 30px;
            background: #3498db;
            border: 2px solid #1a5276;
            border-radius: 10px 10px 0 0;
        }
        .sofa-cushion:nth-child(1) { left: 20px; }
        .sofa-cushion:nth-child(2) { left: 80px; }
        .sofa-cushion:nth-child(3) { left: 140px; }
        
        .coffee-table {
            position: absolute;
            left: 400px;
            top: 420px;
            width: 100px;
            height: 50px;
            background: #8b4513;
            border: 3px solid #5a2d0c;
            border-radius: 5px;
        }
        .coffee-table::before,
        .coffee-table::after {
            content: '';
            position: absolute;
            bottom: -40px;
            width: 12px;
            height: 40px;
            background: #5a2d0c;
        }
        .coffee-table::before { left: 15px; }
        .coffee-table::after { right: 15px; }
        
        /* 茶杯 */
        .teacup {
            position: absolute;
            left: 430px;
            top: 430px;
            width: 20px;
            height: 18px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 0 0 10px 10px;
        }
        .teacup::before {
            content: '';
            position: absolute;
            right: -8px;
            top: 3px;
            width: 8px;
            height: 8px;
            border: 2px solid #ddd;
            border-radius: 0 50% 50% 0;
        }
        
        /* 蒸汽 */
        .steam {
            position: absolute;
            left: 435px;
            top: 415px;
            width: 4px;
            height: 15px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: steam 2s ease-in-out infinite;
        }
        @keyframes steam {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-10px) scale(1.5); opacity: 0; }
        }
        
        /* 植物 */
        .plant {
            position: absolute;
            left: 580px;
            top: 380px;
            width: 50px;
            height: 70px;
        }
        .pot {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 30px;
            height: 25px;
            background: #e67e22;
            border: 2px solid #d35400;
            border-radius: 0 0 5px 5px;
        }
        .leaf {
            position: absolute;
            width: 20px;
            height: 30px;
            background: #27ae60;
            border: 1px solid #1e8449;
            border-radius: 50% 50% 50% 0;
        }
        .leaf:nth-child(1) { top: 10px; left: 5px; transform: rotate(-30deg); }
        .leaf:nth-child(2) { top: 5px; left: 15px; transform: rotate(0deg); }
        .leaf:nth-child(3) { top: 10px; left: 25px; transform: rotate(30deg); }
        
        /* 右侧电脑区 */
        .desk-area {
            position: absolute;
            right: 50px;
            top: 150px;
            width: 200px;
            height: 150px;
        }
        
        .desk {
            position: absolute;
            bottom: 0;
            width: 180px;
            height: 80px;
            background: #8b6914;
            border: 3px solid #5a4510;
            border-radius: 5px;
        }
        .desk::before,
        .desk::after {
            content: '';
            position: absolute;
            bottom: -60px;
            width: 15px;
            height: 60px;
            background: #5a4510;
        }
        .desk::before { left: 20px; }
        .desk::after { right: 20px; }
        
        /* 显示器 */
        .monitor {
            position: absolute;
            bottom: 85px;
            left: 50px;
            width: 80px;
            height: 60px;
            background: #2c3e50;
            border: 3px solid #1a252f;
            border-radius: 5px;
        }
        .monitor-screen {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            background: #000;
            overflow: hidden;
        }
        .monitor-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(0,255,0,0.1) 0%,
                rgba(0,255,0,0.05) 100%
            );
            animation: screenGlow 2s ease-in-out infinite;
        }
        .code-lines {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 90%;
        }
        .code-line {
            height: 3px;
            background: #0f0;
            margin-bottom: 4px;
            opacity: 0.5;
        }
        @keyframes screenGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        /* 键盘 */
        .keyboard {
            position: absolute;
            bottom: 10px;
            left: 40px;
            width: 100px;
            height: 15px;
            background: #34495e;
            border: 2px solid #2c3e50;
            border-radius: 3px;
        }
        
        /* 办公椅 */
        .office-chair {
            position: absolute;
            right: 100px;
            top: 280px;
            width: 60px;
            height: 80px;
        }
        .chair-back {
            position: absolute;
            top: 0;
            left: 10px;
            width: 40px;
            height: 50px;
            background: #e74c3c;
            border: 2px solid #c0392b;
            border-radius: 10px 10px 0 0;
        }
        .chair-seat {
            position: absolute;
            bottom: 20px;
            left: 5px;
            width: 50px;
            height: 20px;
            background: #c0392b;
            border: 2px solid #a93226;
            border-radius: 5px;
        }
        .chair-base {
            position: absolute;
            bottom: 0;
            left: 25px;
            width: 10px;
            height: 20px;
            background: #7f8c8d;
        }
        
        /* 窗户 */
        .window {
            position: absolute;
            right: 80px;
            top: 30px;
            width: 100px;
            height: 80px;
            background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
            border: 4px solid #4a3728;
        }
        .window::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 4px;
            background: #4a3728;
            top: 50%;
            transform: translateY(-50%);
        }
        .window::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 100%;
            background: #4a3728;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* 像素小人 */
        .agent {
            position: absolute;
            width: 50px;
            height: 70px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .agent-head {
            width: 35px;
            height: 35px;
            background: #fdbf60;
            border: 3px solid #333;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
        }
        .agent-head::before, .agent-head::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: #333;
            border-radius: 50%;
            top: 12px;
        }
        .agent-head::before { left: 7px; }
        .agent-head::after { right: 7px; }
        .agent-body {
            width: 40px;
            height: 35px;
            background: #e94560;
            border: 3px solid #333;
            border-radius: 10px 10px 5px 5px;
            margin: 2px auto 0;
            position: relative;
        }
        .agent-body::before {
            content: '🦞';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
        }
        
        /* 位置状态 */
        .agent.at-computer {
            right: 130px;
            top: 240px;
        }
        .agent.at-sofa {
            left: 425px;
            top: 310px;
        }
        .agent.at-bookshelf {
            left: 55px;
            top: 260px;
        }
        
        /* 思考气泡 */
        .thought-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 3px solid #333;
            border-radius: 15px;
            padding: 10px 15px;
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 200;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #333;
        }
        .thought-bubble.show {
            opacity: 1;
        }
        
        /* 状态指示器 */
        .status-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 3px solid #e94560;
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 150;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .status-dot.online { background: #2ecc71; }
        .status-dot.coding { background: #3498db; }
        .status-dot.researching { background: #f39c12; }
        .status-dot.chatting { background: #e91e63; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        .status-text {
            font-size: 14px;
            color: #fff;
        }
        
        /* 底部状态面板 */
        .control-panel {
            margin-top: 20px;
            padding: 20px 30px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 4px solid #e94560;
            border-radius: 15px;
            min-width: 400px;
            text-align: center;
        }
        .panel-title {
            color: #e94560;
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #000;
        }
        .current-activity {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 10px;
        }
        .activity-detail {
            font-size: 0.9rem;
            color: #888;
        }
        .last-update {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>🦞 OpenClaw 像素工作室</h1>
    
    <div class="room">
        <!-- 地板 -->
        <div class="floor"></div>
        
        <!-- 墙壁 -->
        <div class="wall-left"></div>
        <div class="wall-center"></div>
        <div class="wall-right"></div>
        
        <!-- 窗户 -->
        <div class="window"></div>
        
        <!-- 书架区域 -->
        <div class="bookshelf">
            <div class="shelf"></div>
            <div class="shelf"></div>
            <div class="shelf"></div>
        </div>
        <div class="book b1"></div>
        <div class="book b2"></div>
        <div class="book b3"></div>
        <div class="book b4"></div>
        <div class="book b5"></div>
        <div class="book b6"></div>
        <div class="book b7"></div>
        
        <!-- 台灯 -->
        <div class="lamp">
            <div class="lamp-shade"></div>
            <div class="lamp-pole"></div>
            <div class="lamp-base"></div>
        </div>
        
        <!-- 海报 -->
        <div class="poster">🦞</div>
        
        <!-- 中间沙发区 -->
        <div class="rug"></div>
        
        <div class="sofa">
            <div class="sofa-cushion"></div>
            <div class="sofa-cushion"></div>
            <div class="sofa-cushion"></div>
        </div>
        
        <div class="coffee-table"></div>
        <div class="teacup"></div>
        <div class="steam"></div>
        
        <!-- 植物 -->
        <div class="plant">
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="pot"></div>
        </div>
        
        <!-- 右侧电脑区 -->
        <div class="desk-area">
            <div class="monitor">
                <div class="monitor-screen">
                    <div class="code-lines">
                        <div class="code-line" style="width: 80%"></div>
                        <div class="code-line" style="width: 60%"></div>
                        <div class="code-line" style="width: 90%"></div>
                        <div class="code-line" style="width: 70%"></div>
                        <div class="code-line" style="width: 50%"></div>
                    </div>
                </div>
            </div>
            <div class="keyboard"></div>
            <div class="desk"></div>
        </div>
        
        <div class="office-chair">
            <div class="chair-back"></div>
            <div class="chair-seat"></div>
            <div class="chair-base"></div>
        </div>
        
        <!-- 像素小人 -->
        <div class="agent at-sofa" id="agent">
            <div class="thought-bubble" id="thought">正在和老大聊天...</div>
            <div class="agent-head"></div>
            <div class="agent-body"></div>
        </div>
        
        <!-- 状态指示器 -->
        <div class="status-indicator">
            <div class="status-dot chatting" id="statusDot"></div>
            <span class="status-text" id="statusIndicator">在线 - 聊天中</span>
        </div>
    </div>
    
    <div class="control-panel">
        <div class="panel-title">📊 实时工作状态</div>
        <div class="current-activity" id="currentActivity">在沙发上与老大聊天 💬</div>
        <div class="activity-detail" id="activityDetail">等待指令中...</div>
        <div class="last-update" id="lastUpdate">最后更新: 刚刚</div>
    </div>

    <script>
        const agent = document.getElementById('agent');
        const thought = document.getElementById('thought');
        const statusDot = document.getElementById('statusDot');
        const statusIndicator = document.getElementById('statusIndicator');
        const currentActivity = document.getElementById('currentActivity');
        const activityDetail = document.getElementById('activityDetail');
        const lastUpdate = document.getElementById('lastUpdate');
        
        // 状态配置
        const states = {
            CHATTING: {
                position: 'at-sofa',
                dotClass: 'chatting',
                indicator: '在线 - 聊天中',
                activity: '在沙发上与老大聊天 💬',
                thought: '正在和老大聊天...',
                color: '#e91e63'
            },
            CODING: {
                position: 'at-computer',
                dotClass: 'coding',
                indicator: '在线 - 写代码',
                activity: '在电脑前专注编码 💻',
                thought: '写代码中，请勿打扰...',
                color: '#3498db'
            },
            RESEARCHING: {
                position: 'at-bookshelf',
                dotClass: 'researching',
                indicator: '在线 - 查资料',
                activity: '在书架查阅资料 📚',
                thought: '搜索信息中...',
                color: '#f39c12'
            },
            IDLE: {
                position: 'at-sofa',
                dotClass: 'online',
                indicator: '在线 - 待机',
                activity: '在沙发上休息 ☕',
                thought: '等待指令...',
                color: '#2ecc71'
            }
        };
        
        let currentState = 'CHATTING';
        
        function updateState(stateKey, detail = '') {
            const state = states[stateKey];
            if (!state) return;
            
            currentState = stateKey;
            
            // 更新位置
            agent.className = `agent ${state.position}`;
            
            // 更新思考气泡
            thought.textContent = state.thought;
            thought.style.borderColor = state.color;
            thought.classList.add('show');
            setTimeout(() => thought.classList.remove('show'), 3000);
            
            // 更新状态指示器
            statusDot.className = `status-dot ${state.dotClass}`;
            statusIndicator.textContent = state.indicator;
            statusIndicator.style.color = state.color;
            
            // 更新面板
            currentActivity.textContent = state.activity;
            activityDetail.textContent = detail || state.thought;
            
            // 更新时间
            const now = new Date();
            lastUpdate.textContent = `最后更新: ${now.toLocaleTimeString('zh-CN')}`;
        }
        
        // 从 status.json 读取状态
        async function fetchStatus() {
            try {
                const response = await fetch('status.json?t=' + Date.now());
                const data = await response.json();
                
                if (data.status !== currentState) {
                    updateState(data.status, data.details);
                } else if (data.details) {
                    activityDetail.textContent = data.details;
                }
            } catch (error) {
                console.log('状态读取失败:', error);
            }
        }
        
        // 每2秒检查一次状态
        setInterval(fetchStatus, 2000);
        
        // 初始显示思考气泡
        setTimeout(() => {
            thought.classList.add('show');
            setTimeout(() => thought.classList.remove('show'), 3000);
        }, 1000);
        
        // 首次获取状态
        fetchStatus();
    </script>
</body>
</html>
