<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 像素房间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #2d2d2d;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #000;
        }
        .room {
            width: 800px;
            height: 500px;
            background: #8b7355;
            border: 4px solid #4a3728;
            position: relative;
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* 地板 */
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: repeating-linear-gradient(
                90deg,
                #a08060 0px,
                #a08060 40px,
                #8b7355 40px,
                #8b7355 80px
            );
            border-top: 4px solid #4a3728;
        }
        /* 墙壁 */
        .wall {
            position: absolute;
            top: 0;
            width: 100%;
            height: 380px;
            background: #d4c4a8;
            background-image: 
                repeating-linear-gradient(90deg, transparent, transparent 78px, #c4b498 78px, #c4b498 80px);
        }
        /* 窗户 */
        .window {
            position: absolute;
            top: 60px;
            left: 100px;
            width: 120px;
            height: 100px;
            background: #87ceeb;
            border: 4px solid #4a3728;
        }
        .window::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 4px;
            background: #4a3728;
            top: 50%;
            transform: translateY(-50%);
        }
        .window::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 100%;
            background: #4a3728;
            left: 50%;
            transform: translateX(-50%);
        }
        /* 电脑桌 */
        .desk {
            position: absolute;
            bottom: 120px;
            right: 80px;
            width: 180px;
            height: 100px;
            background: #654321;
            border: 3px solid #3d2817;
        }
        .desk::before {
            content: '';
            position: absolute;
            bottom: -60px;
            left: 20px;
            width: 15px;
            height: 60px;
            background: #3d2817;
        }
        .desk::after {
            content: '';
            position: absolute;
            bottom: -60px;
            right: 20px;
            width: 15px;
            height: 60px;
            background: #3d2817;
        }
        /* 电脑 */
        .computer {
            position: absolute;
            bottom: 220px;
            right: 130px;
            width: 80px;
            height: 60px;
            background: #333;
            border: 3px solid #111;
            border-radius: 5px;
        }
        .computer::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 15px;
            background: #333;
        }
        .screen {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            background: #0f0;
            opacity: 0.3;
            animation: screenGlow 2s ease-in-out infinite;
        }
        @keyframes screenGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        /* 椅子 */
        .chair {
            position: absolute;
            bottom: 120px;
            right: 200px;
            width: 50px;
            height: 70px;
            background: #8b4513;
            border: 3px solid #5a2d0c;
            border-radius: 5px 5px 0 0;
        }
        .chair::before {
            content: '';
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 40px;
            background: #5a2d0c;
        }
        /* 茶几 */
        .table {
            position: absolute;
            bottom: 120px;
            left: 200px;
            width: 140px;
            height: 70px;
            background: #8b4513;
            border: 3px solid #5a2d0c;
            border-radius: 5px;
        }
        .table::before {
            content: '';
            position: absolute;
            bottom: -50px;
            left: 30px;
            width: 12px;
            height: 50px;
            background: #5a2d0c;
        }
        .table::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: 30px;
            width: 12px;
            height: 50px;
            background: #5a2d0c;
        }
        /* 茶杯 */
        .cup {
            position: absolute;
            bottom: 190px;
            left: 250px;
            width: 20px;
            height: 20px;
            background: #fff;
            border: 2px solid #ccc;
            border-radius: 3px;
        }
        .cup::before {
            content: '';
            position: absolute;
            right: -8px;
            top: 3px;
            width: 8px;
            height: 8px;
            border: 2px solid #ccc;
            border-radius: 0 50% 50% 0;
        }
        /* 书架 */
        .bookshelf {
            position: absolute;
            bottom: 120px;
            left: 30px;
            width: 100px;
            height: 200px;
            background: #654321;
            border: 3px solid #3d2817;
        }
        .shelf {
            position: absolute;
            width: 100%;
            height: 8px;
            background: #3d2817;
        }
        .shelf:nth-child(1) { top: 50px; }
        .shelf:nth-child(2) { top: 100px; }
        .shelf:nth-child(3) { top: 150px; }
        /* 书籍 */
        .book {
            position: absolute;
            width: 15px;
            height: 40px;
            border: 1px solid #333;
        }
        .book1 { bottom: 160px; left: 40px; background: #e74c3c; }
        .book2 { bottom: 160px; left: 58px; background: #3498db; }
        .book3 { bottom: 160px; left: 76px; background: #2ecc71; }
        .book4 { bottom: 110px; left: 45px; background: #f39c12; }
        .book5 { bottom: 110px; left: 63px; background: #9b59b6; }
        .book6 { bottom: 60px; left: 50px; background: #1abc9c; }
        /* 像素小人 */
        .agent {
            position: absolute;
            width: 40px;
            height: 60px;
            transition: all 0.5s ease;
            z-index: 10;
        }
        .agent-head {
            width: 30px;
            height: 30px;
            background: #fdbf60;
            border: 2px solid #333;
            margin: 0 auto;
            position: relative;
        }
        .agent-head::before, .agent-head::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #333;
            top: 10px;
        }
        .agent-head::before { left: 6px; }
        .agent-head::after { right: 6px; }
        .agent-body {
            width: 36px;
            height: 30px;
            background: #e94560;
            border: 2px solid #333;
            margin: 2px auto 0;
        }
        /* 位置状态 */
        .agent.at-computer {
            bottom: 190px;
            right: 210px;
        }
        .agent.at-table {
            bottom: 190px;
            left: 250px;
        }
        .agent.at-bookshelf {
            bottom: 220px;
            left: 60px;
        }
        /* 状态标签 */
        .status-panel {
            margin-top: 20px;
            padding: 15px 30px;
            background: #1a1a2e;
            border: 3px solid #e94560;
            border-radius: 10px;
            color: #fff;
            text-align: center;
        }
        .status-title {
            color: #e94560;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .status-text {
            font-size: 1rem;
            min-height: 24px;
        }
        .activity-log {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
            max-width: 600px;
        }
        /* 思考气泡 */
        .thought-bubble {
            position: absolute;
            background: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            color: #333;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 20;
        }
        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #333;
        }
        .thought-bubble.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>🦞 OpenClaw 像素房间</h1>
    
    <div class="room">
        <!-- 房间背景 -->
        <div class="wall"></div>
        <div class="floor"></div>
        
        <!-- 窗户 -->
        <div class="window"></div>
        
        <!-- 书架区域 -->
        <div class="bookshelf">
            <div class="shelf"></div>
            <div class="shelf"></div>
            <div class="shelf"></div>
        </div>
        <div class="book book1"></div>
        <div class="book book2"></div>
        <div class="book book3"></div>
        <div class="book book4"></div>
        <div class="book book5"></div>
        <div class="book book6"></div>
        
        <!-- 茶几区域 -->
        <div class="table"></div>
        <div class="cup"></div>
        
        <!-- 电脑桌区域 -->
        <div class="desk"></div>
        <div class="computer">
            <div class="screen"></div>
        </div>
        <div class="chair"></div>
        
        <!-- 像素小人 -->
        <div class="agent at-table" id="agent">
            <div class="thought-bubble" id="thought">正在和老大聊天...</div>
            <div class="agent-head"></div>
            <div class="agent-body"></div>
        </div>
    </div>
    
    <div class="status-panel">
        <div class="status-title">当前状态</div>
        <div class="status-text" id="statusText">在茶几旁与老大聊天 💬</div>
        <div class="activity-log" id="activityLog">等待指令中...</div>
    </div>

    <script>
        const agent = document.getElementById('agent');
        const thought = document.getElementById('thought');
        const statusText = document.getElementById('statusText');
        const activityLog = document.getElementById('activityLog');
        
        // 状态定义
        const states = {
            CHATTING: {
                position: 'at-table',
                text: '在茶几旁与老大聊天 💬',
                thought: '正在和老大聊天...',
                log: '实时对话中'
            },
            CODING: {
                position: 'at-computer',
                text: '在电脑前写代码 💻',
                thought: '专注编码中...',
                log: '编写/调试代码'
            },
            RESEARCHING: {
                position: 'at-bookshelf',
                text: '在书架查阅资料 📚',
                thought: '查找信息中...',
                log: '搜索/分析资料'
            }
        };
        
        let currentState = 'CHATTING';
        
        function setState(stateKey) {
            const state = states[stateKey];
            if (!state) return;
            
            currentState = stateKey;
            
            // 更新位置
            agent.className = `agent ${state.position}`;
            
            // 更新思考气泡
            thought.textContent = state.thought;
            thought.classList.add('show');
            setTimeout(() => thought.classList.remove('show'), 2000);
            
            // 更新状态文字
            statusText.textContent = state.text;
            activityLog.textContent = state.log;
        }
        
        // 模拟状态切换（演示用）
        function simulateActivity() {
            const activities = ['CHATTING', 'CODING', 'RESEARCHING'];
            let index = 0;
            
            setInterval(() => {
                index = (index + 1) % activities.length;
                setState(activities[index]);
            }, 5000);
        }
        
        // 启动演示
        setTimeout(simulateActivity, 3000);
        
        // 初始显示思考气泡
        setTimeout(() => {
            thought.classList.add('show');
            setTimeout(() => thought.classList.remove('show'), 2000);
        }, 1000);
    </script>
</body>
</html>
